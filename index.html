<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#f3efe8;
font-family:'Playfair Display',serif;
text-align:center;
overflow-x:hidden;
}

/* ================= SOBRE ================= */

#envelope-container{
position:fixed;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#f3efe8;
z-index:10;
}

#instruction{
margin-bottom:40px;
font-size:18px;
color:#444;
}

.envelope{
width:420px;
height:250px;
background:#e6dccd;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
overflow:hidden;
}

.flap{
position:absolute;
top:0;
width:100%;
height:100%;
background:#d9ccb8;
clip-path:polygon(0 0,100% 0,50% 55%);
transition:1s ease;
transform-origin:top;
}

.seal{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:white;
font-size:17px;

/* sello estilo anterior elegante */
background:
radial-gradient(circle at 30% 30%, #e2b44a, #b8831c 70%);
box-shadow:
inset -3px -4px 8px rgba(0,0,0,0.4),
inset 3px 3px 6px rgba(255,230,150,0.5),
0 6px 15px rgba(0,0,0,0.3);
transition:0.6s;
}

/* ================= HERO ================= */

#hero{
display:none;
padding:120px 20px;
position:relative;
}

/* Laureles verdes */

.laurel-left,
.laurel-right{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:120px;
color:#2f5d3a;
opacity:0.15;
}

.laurel-left{ left:5%; }
.laurel-right{ right:5%; }

/* NOMBRES */

.names{
font-family:'Great Vibes',cursive;
font-size:68px;
color:white;
-webkit-text-stroke:1.3px black;
margin-bottom:30px;
}

/* DETALLES */

.details{
font-size:20px;
}

button{
margin-top:30px;
padding:12px 25px;
border:none;
background:#b48a3a;
color:white;
border-radius:5px;
cursor:pointer;
}

/* ================= PÉTALOS ================= */

.petal{
position:fixed;
top:-10px;
width:12px;
height:12px;
background:#d88aa3;
border-radius:50%;
opacity:0.8;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div id="envelope-container">
<div id="instruction">Haz clic en el sobre para abrir la invitación</div>

<div class="envelope" onclick="openInvitation()">
<div class="flap" id="flap"></div>
<div class="seal">B & L</div>
</div>
</div>

<div id="hero">

<div class="laurel-left">❧</div>
<div class="laurel-right">❧</div>

<div class="names">Bryan & Luciana</div>

<div class="details">
<p>27 de Junio 2026</p>
<p>4:30 PM</p>

<p>
<a href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">
Ver ubicación
</a>
</p>

<p id="countdown"></p>

<button onclick="addToCalendar()">Agregar al Calendario</button>
</div>
</div>

<script>

/* Siempre volver al sobre */
window.onload=function(){
document.getElementById("hero").style.display="none";
document.getElementById("envelope-container").style.display="flex";
}

/* Abrir invitación */
function openInvitation(){
document.getElementById("flap").style.transform="rotateX(180deg)";
document.querySelector(".seal").style.opacity="0";

createPetals();

setTimeout(()=>{
document.getElementById("envelope-container").style.display="none";
document.getElementById("hero").style.display="block";
},1000);
}

/* Pétalos */
function createPetals(){
for(let i=0;i<25;i++){
let petal=document.createElement("div");
petal.classList.add("petal");
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(petal);

setTimeout(()=>{petal.remove();},6000);
}
}

/* Cuenta regresiva */
var eventDate=new Date("June 27, 2026 16:30:00").getTime();

setInterval(function(){
var now=new Date().getTime();
var distance=eventDate-now;

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML=
"Faltan "+days+" días "+hours+"h "+minutes+"m";
},1000);

/* Calendario 4:30 PM */
function addToCalendar(){
var start="20260627T163000";
var end="20260627T213000";

var url="https://calendar.google.com/calendar/render?action=TEMPLATE"
+"&text=Boda Bryan y Luciana"
+"&dates="+start+"/"+end
+"&details=Nos encantaría que nos acompañes"
+"&location=https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7";

window.open(url);
}

</script>

</body>
</html>
