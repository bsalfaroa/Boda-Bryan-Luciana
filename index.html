<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f3efe8;
  color: #444;
  text-align: center;
  overflow-x: hidden;
  transition: background 1.5s ease;
}

body.opened {
  background: #f8f5f0;
}

/* HERO oculto inicialmente */
.hero {
  background-image: url('foto-portada.jpg');
  background-size: cover;
  background-position: center;
  padding: 140px 20px;
  color: white;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease;
}

.hero.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 65px;
  margin: 0;
  text-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.section {
  padding: 60px 20px;
}

/* ===== SOBRE PREMIUM ===== */
.envelope-container {
  perspective: 1200px;
  width: 320px;
  height: 220px;
  margin: 100px auto;
  position: relative;
  cursor: pointer;
  transition: opacity 1s ease, transform 1s ease;
}

.envelope-container.fade-out {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
}

/* textura tipo lino */
.envelope-base {
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    45deg,
    #f1e7d8,
    #f1e7d8 2px,
    #ede2d2 2px,
    #ede2d2 4px
  );
  border-radius: 8px;
  position: absolute;
  bottom: 0;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.envelope-flap {
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    -45deg,
    #e8dcc8,
    #e8dcc8 2px,
    #e2d5c0 2px,
    #e2d5c0 4px
  );
  position: absolute;
  top: 0;
  clip-path: polygon(0 0, 100% 0, 50% 70%);
  transform-origin: top;
  transition: transform 1.2s ease;
  z-index: 3;
}

/* sello dorado realista */
.seal {
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 30% 30%, #fff3b0, #d4af37, #a67c00);
  border-radius: 50%;
  position: absolute;
  left: 50%;
  top: 68%;
  transform: translate(-50%, -50%);
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 20px;
  color: #fff8dc;
  font-family: 'Playfair Display', serif;
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.3);
  transition: opacity 0.6s ease;
}

.envelope-container.open .envelope-flap {
  transform: rotateX(180deg);
}

.envelope-container.open .seal {
  opacity: 0;
}

/* CONTENIDO */
#contenido {
  opacity: 0;
  transform: translateY(50px);
  transition: all 1.5s ease;
}

#contenido.visible {
  opacity: 1;
  transform: translateY(0);
}

.date {
  font-size: 28px;
  margin-top: 20px;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 28px;
  background: linear-gradient(45deg, #b8962e, #e6c35c);
  color: white;
  text-decoration: none;
  border-radius: 40px;
  font-weight: 600;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.gallery img {
  width: 90%;
  max-width: 320px;
  margin: 12px;
  border-radius: 20px;
}

footer {
  padding: 40px;
  font-size: 14px;
  background: #eae3d8;
}
</style>
</head>
<body>

<div class="section" id="intro">
  <p>Haz clic en el sobre para abrir la invitación</p>

  <div class="envelope-container" id="sobre" onclick="abrirInvitacion()">
    <div class="envelope-base"></div>
    <div class="envelope-flap"></div>
    <div class="seal">B & L</div>
  </div>
</div>

<div class="hero" id="hero">
  <h1>Bryan & Luciana</h1>
</div>

<div id="contenido" class="section">
  <h2>Nos casamos el día:</h2>
  <div class="date">Sábado, 27 de junio 2026</div>
  <a class="button" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Bryan+y+Luciana&dates=20260627/20260628" target="_blank">Agregar a mi calendario</a>
</div>

<div class="section">
  <h2>Ubicación del Evento</h2>
  <a class="button" href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">Ver en Google Maps</a>
</div>

<div class="section gallery">
  <h2>Nuestras Fotos</h2>
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<footer>
  Con amor, 2026
</footer>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function abrirInvitacion() {
  const sobre = document.getElementById('sobre');
  const contenido = document.getElementById('contenido');
  const musica = document.getElementById('musica');
  const intro = document.getElementById('intro');
  const hero = document.getElementById('hero');

  document.body.classList.add('opened');
  sobre.classList.add('open');

  setTimeout(() => {
    sobre.classList.add('fade-out');
  }, 1000);

  setTimeout(() => {
    intro.style.display = 'none';
    hero.classList.add('visible');
    contenido.classList.add('visible');
    window.scrollTo({ top: hero.offsetTop, behavior: 'smooth' });
    musica.play();
  }, 1700);
}

// Cuenta regresiva
const fechaBoda = new Date("June 27, 2026 00:00:00").getTime();
const contador = document.createElement('div');
contador.style.fontSize = '22px';
contador.style.marginTop = '20px';
document.querySelector('.date').after(contador);

setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
  contador.innerHTML = `Faltan ${dias} días y ${horas} horas`;
}, 1000);
</script>

</body>
</html>
