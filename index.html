<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f5f5f2;
  color: #444;
  text-align: center;
  overflow-x: hidden;
}

.hero {
  background-image: url('foto-portada.jpg');
  background-size: cover;
  background-position: center;
  padding: 120px 20px;
  color: white;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  margin: 0;
}

.section {
  padding: 60px 20px;
}

/* ===== SOBRE REAL 3D ===== */
.envelope-container {
  perspective: 1000px;
  width: 300px;
  height: 200px;
  margin: 50px auto;
  position: relative;
  cursor: pointer;
}

.envelope-base {
  width: 100%;
  height: 100%;
  background: #f1e9dc;
  border-radius: 6px;
  position: absolute;
  bottom: 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.envelope-flap {
  width: 100%;
  height: 100%;
  background: #e8decd;
  position: absolute;
  top: 0;
  clip-path: polygon(0 0, 100% 0, 50% 70%);
  transform-origin: top;
  transition: transform 1.2s ease;
  z-index: 3;
}

.seal {
  width: 60px;
  height: 60px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  left: 50%;
  top: 65%;
  transform: translate(-50%, -50%);
  z-index: 4;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
  transition: opacity 0.5s ease;
}

.letter {
  width: 90%;
  height: 90%;
  background: white;
  position: absolute;
  left: 5%;
  top: 5%;
  border-radius: 4px;
  transform: translateY(40px);
  opacity: 0;
  transition: all 1s ease;
  z-index: 1;
}

.envelope-container.open .envelope-flap {
  transform: rotateX(180deg);
}

.envelope-container.open .seal {
  opacity: 0;
}

.envelope-container.open .letter {
  transform: translateY(-120px);
  opacity: 1;
}

/* CONTENIDO */
#contenido {
  opacity: 0;
  transform: translateY(50px);
  transition: all 1.2s ease;
}

#contenido.visible {
  opacity: 1;
  transform: translateY(0);
}

.date {
  font-size: 28px;
  margin-top: 20px;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background-color: #6c8f76;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

.gallery img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 15px;
}

footer {
  padding: 30px;
  font-size: 14px;
  background: #eaeaea;
}
</style>
</head>
<body>

<div class="hero">
  <h1>Bryan & Luciana</h1>
</div>

<div class="section">
  <p>Haz clic en el sobre para abrir la invitación</p>

  <div class="envelope-container" id="sobre" onclick="abrirInvitacion()">
    <div class="envelope-base"></div>
    <div class="letter"></div>
    <div class="envelope-flap"></div>
    <div class="seal"></div>
  </div>
</div>

<div id="contenido" class="section">
  <h2>Nos casamos el día:</h2>
  <div class="date">Sábado, 27 de junio 2026</div>
  <a class="button" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Bryan+y+Luciana&dates=20260627/20260628" target="_blank">Agregar a mi calendario</a>
</div>

<div class="section">
  <h2>Ubicación del Evento</h2>
  <a class="button" href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">Ver en Google Maps</a>
</div>

<div class="section gallery">
  <h2>Nuestras Fotos</h2>
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<footer>
  Con amor, 2026
</footer>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function abrirInvitacion() {
  const sobre = document.getElementById('sobre');
  const contenido = document.getElementById('contenido');
  const musica = document.getElementById('musica');

  sobre.classList.add('open');

  setTimeout(() => {
    contenido.classList.add('visible');
    window.scrollTo({ top: contenido.offsetTop - 50, behavior: 'smooth' });
    musica.play();
  }, 1300);
}

// Cuenta regresiva
const fechaBoda = new Date("June 27, 2026 00:00:00").getTime();
const contador = document.createElement('div');
contador.style.fontSize = '22px';
contador.style.marginTop = '20px';
document.querySelector('.date').after(contador);

setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
  contador.innerHTML = `Faltan ${dias} días y ${horas} horas`;
}, 1000);
</script>

</body>
</html>
