<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:#d7dbc8;
}

.wrapper{
max-width:430px;
margin:auto;
background:#f3efe8;
min-height:100vh;
text-align:center;
padding:40px 25px;
box-sizing:border-box;
}

.intro{
font-size:18px;
line-height:1.6;
margin-bottom:30px;
color:#4a4a4a;
}

.nombres{
font-family:'Great Vibes',cursive;
font-size:48px;
margin-bottom:25px;
}

.foto{
width:250px;
height:250px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
margin:auto;
display:block;
opacity:0;
transform:scale(.9);
animation:fotoFade 1.2s ease forwards;
}

@keyframes fotoFade{
to{
opacity:1;
transform:scale(1);
}
}

.noscasamos{
font-size:36px;
letter-spacing:3px;
margin-top:60px;
margin-bottom:10px;
opacity:0;
transform:translateY(20px);
animation:textFade 1s ease forwards;
animation-delay:.6s;
}

@keyframes textFade{
to{
opacity:1;
transform:translateY(0);
}
}

.decor{
font-size:20px;
margin-bottom:10px;
}

.fecha{
font-size:28px;
font-weight:500;
margin-bottom:10px;
}

.contador{
font-size:18px;
margin-bottom:30px;
}

.boton{
display:inline-block;
background:linear-gradient(#c7a33c,#a8872c);
color:white;
padding:14px 28px;
border-radius:30px;
text-decoration:none;
font-size:16px;
margin:10px 0;
box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

.seccion{
margin-top:45px;
}

.titulo{
font-size:20px;
letter-spacing:2px;
margin-bottom:10px;
}

.lugar{
font-size:22px;
font-weight:500;
}

.hora{
font-size:18px;
margin-top:5px;
}

.vestimenta{
font-size:18px;
}

.final{
margin-top:70px;
font-size:22px;
}

.nombres-final{
font-family:'Great Vibes',cursive;
font-size:42px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="wrapper">

<p class="intro">
Te invitamos a celebrar con nosotros uno de los días más importantes de nuestra vida
</p>

<div class="nombres">
Bryan & Luciana
</div>

<img src="foto.jpg" class="foto">

<div class="noscasamos">
Nos casamos
</div>

<div class="decor">
❦
</div>

<div class="fecha">
27 de Junio 2026
</div>

<div class="contador">
Faltan 113 días
</div>

<a class="boton" href="#">
Agregar al calendario
</a>

<div class="seccion">

<div class="titulo">
Ceremonia & Recepción
</div>

<div class="lugar">
Quinta Mirasol
</div>

<div class="hora">
4:30 PM
</div>

<a class="boton" href="https://maps.google.com" target="_blank">
Ver ubicación
</a>

</div>

<div class="seccion">

<div class="titulo">
Código de vestimenta
</div>

<div class="vestimenta">
Formal / Elegante
</div>

</div>

<div class="final">
Te esperamos
</div>

<div class="nombres-final">
Bryan & Luciana
</div>

</div>

</body>
</html>
