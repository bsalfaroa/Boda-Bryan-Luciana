<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3efe8;
font-family:'Playfair Display',serif;
overflow-x:hidden;
text-align:center;
}

/* SOBRE */

#envelope-container{
position:fixed;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#f3efe8;
z-index:10;
}

#instruction{
margin-bottom:40px;
font-size:18px;
color:#444;
}

.envelope{
width:420px;
height:250px;
background:#e6dccd;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.flap{
position:absolute;
top:0;
width:100%;
height:100%;
background:#d9ccb8;
clip-path:polygon(0 0,100% 0,50% 55%);
transition:1s ease;
transform-origin:top;
border-radius:6px;
}

.seal{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:white;
font-size:18px;

/* Oro con bordes quemados */
background:
radial-gradient(circle at 30% 30%, #f7d774, #c79a2e 60%, #8b5e15 100%);
box-shadow:
inset -4px -6px 12px rgba(0,0,0,0.4),
inset 4px 6px 10px rgba(255,220,120,0.5),
0 8px 20px rgba(0,0,0,0.3);
transition:0.8s;
}

/* HERO */

#hero{
display:none;
padding:120px 20px;
position:relative;
animation:fadeIn 2s ease forwards;
}

/* Marco floral */

#hero:before,
#hero:after{
content:"❀ ❁ ❀ ❁ ❀";
position:absolute;
font-size:26px;
color:#b48a3a;
letter-spacing:15px;
width:100%;
left:0;
}

#hero:before{
top:20px;
}

#hero:after{
bottom:20px;
}

/* NOMBRES */

.names{
font-family:'Great Vibes',cursive;
font-size:64px;
color:white;
-webkit-text-stroke:1.5px black;
animation:softGlow 3s ease-in-out infinite alternate;
}

/* DETALLES */

.details{
margin-top:40px;
font-size:20px;
}

button{
margin-top:30px;
padding:12px 25px;
border:none;
background:#b48a3a;
color:white;
border-radius:5px;
cursor:pointer;
}

/* ANIMACIONES */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes softGlow{
from{letter-spacing:1px;}
to{letter-spacing:4px;}
}

</style>
</head>

<body>

<div id="envelope-container">
<div id="instruction">Haz clic en el sobre para abrir la invitación</div>

<div class="envelope" onclick="openInvitation()">
<div class="flap" id="flap"></div>
<div class="seal">B & L</div>
</div>
</div>

<div id="hero">
<div class="names">Bryan & Luciana</div>

<div class="details">
<p>27 de Junio 2026</p>
<p>4:30 PM</p>
<p>
<a href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">
Ver ubicación
</a>
</p>

<p id="countdown"></p>

<button onclick="addToCalendar()">Agregar al Calendario</button>
</div>
</div>

<script>

/* Siempre volver al sobre al refrescar */
window.onload = function(){
document.getElementById("hero").style.display="none";
document.getElementById("envelope-container").style.display="flex";
}

/* Abrir invitación */
function openInvitation(){
document.getElementById("flap").style.transform="rotateX(180deg)";
document.querySelector(".seal").style.opacity="0";

setTimeout(()=>{
document.getElementById("envelope-container").style.display="none";
document.getElementById("hero").style.display="block";
},1000);
}

/* Cuenta regresiva */
var eventDate = new Date("June 27, 2026 16:30:00").getTime();

setInterval(function(){
var now = new Date().getTime();
var distance = eventDate - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
"Faltan " + days + " días " + hours + "h " + minutes + "m";
},1000);

/* Calendario 4:30 PM */
function addToCalendar(){

var start = "20260627T163000";
var end = "20260627T213000";

var url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
+ "&text=Boda Bryan y Luciana"
+ "&dates=" + start + "/" + end
+ "&details=Nos encantaría que nos acompañes"
+ "&location=https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7";

window.open(url);
}

</script>

</body>
</html>
