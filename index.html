<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Playfair Display',serif;
  background:#f3efe8;
  color:#444;
  text-align:center;
  overflow:hidden; /* BLOQUEA SCROLL */
}

/* ===== LAURELES COMPLETOS ===== */
body::before,
body::after{
  content:"";
  position:fixed;
  top:0;
  width:100px;
  height:100vh;
  background:
    radial-gradient(circle at 50% 5%, rgba(120,140,90,0.4) 10px, transparent 11px),
    radial-gradient(circle at 40% 20%, rgba(120,140,90,0.4) 10px, transparent 11px),
    radial-gradient(circle at 60% 35%, rgba(120,140,90,0.4) 10px, transparent 11px),
    radial-gradient(circle at 45% 50%, rgba(120,140,90,0.4) 10px, transparent 11px),
    radial-gradient(circle at 55% 65%, rgba(120,140,90,0.4) 10px, transparent 11px),
    radial-gradient(circle at 50% 80%, rgba(120,140,90,0.4) 10px, transparent 11px);
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:0;
}
body::before{ left:0; }
body::after{ right:0; transform:scaleX(-1); }

/* CONTENIDO OCULTO */
.hero,
.section,
footer{
  opacity:0;
  visibility:hidden;
  transform:translateY(40px);
  transition:all 1.5s ease;
}

.visible{
  opacity:1 !important;
  visibility:visible !important;
  transform:translateY(0) !important;
}

/* BORDE MORADO */
footer{
  background:#eae3d8;
  border-top:6px solid #7c5a92;
  padding:40px;
  font-size:14px;
}

/* INTRO */
#intro{
  margin-top:80px;
  transition:all 1s ease;
}

#intro.fade-out{
  opacity:0;
  transform:scale(0.95);
  pointer-events:none;
}

#intro p{
  font-family:'Great Vibes',cursive;
  font-size:32px;
  margin-bottom:30px;
}

/* SOBRE */
.envelope-container{
  perspective:1200px;
  width:320px;
  height:220px;
  margin:40px auto;
  position:relative;
  cursor:pointer;
}

.envelope-base{
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    45deg,
    #f1e7d8,
    #f1e7d8 2px,
    #ede2d2 2px,
    #ede2d2 4px
  );
  border-radius:8px;
  position:absolute;
  bottom:0;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.envelope-flap{
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    -45deg,
    #e8dcc8,
    #e8dcc8 2px,
    #e2d5c0 2px,
    #e2d5c0 4px
  );
  position:absolute;
  top:0;
  clip-path:polygon(0 0,100% 0,50% 70%);
  transform-origin:top;
  transition:transform 1.2s ease;
  z-index:3;
}

.seal{
  position:absolute;
  top:52%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 25%, #f6d57a 0%, #c9972b 35%, #8a5a10 70%, #5a3a08 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#fff6d5;
  box-shadow:
    0 4px 8px rgba(0,0,0,0.4),
    inset 0 4px 6px rgba(255,255,255,0.3),
    inset 0 -4px 8px rgba(0,0,0,0.6);
  z-index:10;
}

.envelope-container.open .envelope-flap{
  transform:rotateX(180deg);
}

/* HERO */
.hero{
  padding:120px 20px;
  background:#f8f5f0;
}

.hero h1{
  font-family:'Great Vibes',cursive;
  font-size:70px;
  color:white;
  -webkit-text-stroke:2px black;
  text-shadow:0 4px 12px rgba(0,0,0,0.3);
}

/* SECCIONES */
.section{
  padding:60px 20px;
}

.date{
  font-size:28px;
  margin-top:20px;
}

#contador{
  font-size:22px;
  margin-top:15px;
}

/* BOTONES */
.button{
  display:block;
  margin:20px auto;
  width:260px;
  padding:14px;
  border-radius:30px;
  text-decoration:none;
  font-size:16px;
  background:linear-gradient(145deg,#c6a23a,#8f6b1c);
  color:white;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
  transition:0.3s;
}

.button:hover{
  transform:scale(1.05);
}

/* PETALOS */
.petalo{
  position:fixed;
  top:-20px;
  width:12px;
  height:12px;
  background:#e8a6b8;
  border-radius:50%;
  opacity:0.8;
  animation:caer linear forwards;
}

@keyframes caer{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}
</style>
</head>
<body>

<div id="intro">
  <p>Haz click en el sobre</p>
  <div class="envelope-container" id="sobre" onclick="abrirInvitacion()">
    <div class="envelope-base"></div>
    <div class="envelope-flap"></div>
    <div class="seal">B & L</div>
  </div>
</div>

<div class="hero" id="hero">
  <h1>Bryan & Luciana</h1>
</div>

<div class="section" id="info">
  <h2>Nos casamos el día</h2>
  <div class="date">Sábado, 27 de junio 2026</div>
  <div id="contador"></div>

  <a class="button" target="_blank"
  href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Bryan+y+Luciana&dates=20260627T163000/20260627T230000">
  Agregar a mi calendario
  </a>

  <a class="button" target="_blank"
  href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7">
  Ver ubicación
  </a>

  <a class="button" target="_blank"
  href="https://wa.me/1234567890?text=Hola%20Bryan%20y%20Luciana,%20confirmo%20mi%20asistencia%20a%20su%20boda">
  Confirmar asistencia (RSVP)
  </a>
</div>

<footer id="footer">
  Con amor, 2026
</footer>

<script>
function abrirInvitacion(){
  const sobre=document.getElementById('sobre');
  const intro=document.getElementById('intro');

  sobre.classList.add('open');

  setTimeout(()=>{
    intro.classList.add('fade-out');
  },800);

  setTimeout(()=>{
    intro.style.display="none";
    document.body.style.overflow="auto"; // ACTIVA SCROLL
    document.getElementById('hero').classList.add('visible');
    document.getElementById('info').classList.add('visible');
    document.getElementById('footer').classList.add('visible');
    window.scrollTo({top:document.getElementById('hero').offsetTop,behavior:'smooth'});
  },1600);

  for(let i=0;i<50;i++){
    let p=document.createElement('div');
    p.className='petalo';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(5+Math.random()*3)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
  }
}

const fechaBoda=new Date("June 27, 2026 16:30:00").getTime();
const contador=document.getElementById("contador");

  const dias=Math.floor(dif/(1000*60*60*24));
  const horas=Math.floor((dif/(1000*60*60))%24);
  contador.innerHTML=`Faltan ${dias} días y ${horas} horas`;
},1000);
</script>

</body>
</html>
