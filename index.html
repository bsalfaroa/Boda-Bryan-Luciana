<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f3efe8;
  color: #444;
  text-align: center;
  overflow-x: hidden;
  overflow-y: hidden;
  transition: background 1.5s ease;
}

body.opened {
  background: #f8f5f0;
}

/* HERO */
.hero {
  background-image: url('foto-portada.jpg');
  background-size: cover;
  background-position: center;
  padding: 180px 20px;
  color: white;
  opacity: 0;
  visibility: hidden;
  transform: translateY(40px);
  transition: all 1.5s ease;
}

.hero.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 70px;
  letter-spacing: 2px;
  color: white;
  opacity: 0;
  transform: translateY(30px);
  animation: aparecerNombre 2s ease forwards;
  animation-delay: 0.8s;
}

@keyframes aparecerNombre {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Contenido oculto */
#contenido,
#ubicacion,
#galeria,
footer {
  opacity: 0;
  visibility: hidden;
  transform: translateY(30px);
  transition: all 1.5s ease;
}

#contenido.visible,
#ubicacion.visible,
#galeria.visible,
footer.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* SOBRE */

.section {
  padding: 60px 20px;
}

.envelope-container {
  perspective: 1200px;
  width: 340px;
  height: 230px;
  margin: 120px auto;
  position: relative;
  cursor: pointer;
  transition: opacity 1s ease, transform 1s ease;
}

.envelope-container.fade-out {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
}

.envelope-base {
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #f1e7d8, #e6d8c3);
  border-radius: 8px;
  position: absolute;
  bottom: 0;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.envelope-flap {
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #e8dcc8, #d8c8b3);
  position: absolute;
  top: 0;
  clip-path: polygon(0 0, 100% 0, 50% 70%);
  transform-origin: top;
  transition: transform 1.2s ease;
  z-index: 3;
}

/* SELLO ORO QUEMADO */
.seal {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;

  background:
    radial-gradient(circle at 35% 30%, #f7d27a 0%, #d4a63c 35%, #a06f16 65%, #5a3a05 100%);

  clip-path: polygon(
    50% 0%, 65% 8%, 80% 15%, 92% 30%, 100% 50%,
    92% 70%, 80% 85%, 65% 92%, 50% 100%,
    35% 92%, 20% 85%, 8% 70%, 0% 50%,
    8% 30%, 20% 15%, 35% 8%
  );

  display: flex;
  align-items: center;
  justify-content: center;

  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  letter-spacing: 3px;
  color: #fff8dc;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.5),
    inset 0 5px 8px rgba(255,255,255,0.2),
    inset 0 -8px 14px rgba(0,0,0,0.7),
    0 0 0 3px rgba(70,40,0,0.6);

  z-index: 10;
}

.envelope-container.open .envelope-flap {
  transform: rotateX(180deg);
}

.envelope-container.open .seal {
  opacity: 0;
}

.date {
  font-size: 28px;
  margin-top: 20px;
}

/* BOTONES */
.button {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  letter-spacing: 1px;
  background: linear-gradient(145deg, #c6a23a, #8f6b1c);
  color: white;
  text-decoration: none;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  transition: all 0.3s ease;
}

.button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.45);
}

.gallery img {
  width: 90%;
  max-width: 320px;
  margin: 12px;
  border-radius: 20px;
}

footer {
  padding: 40px;
  font-size: 14px;
  background: #eae3d8;
}
</style>
</head>

<body>

<div class="section" id="intro">
  <p>Haz clic en el sobre para abrir la invitación</p>

  <div class="envelope-container" id="sobre" onclick="abrirInvitacion()">
    <div class="envelope-base"></div>
    <div class="envelope-flap"></div>
    <div class="seal">B & L</div>
  </div>
</div>

<div class="hero" id="hero">
  <h1>Bryan & Luciana</h1>
</div>

<div id="contenido" class="section">
  <h2>Nos casamos el día:</h2>
  <div class="date">Sábado, 27 de junio 2026</div>
  <a class="button"
     href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Bryan+y+Luciana&dates=20260627T163000/20260627T230000"
     target="_blank">
     Agregar a mi calendario
  </a>
</div>

<div class="section" id="ubicacion">
  <h2>Ubicación del Evento</h2>
  <a class="button" href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">
     Ver en Google Maps
  </a>
</div>

<div class="section gallery" id="galeria">
  <h2>Nuestras Fotos</h2>
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<footer id="footer">
  Con amor, 2026
</footer>

<script>
function abrirInvitacion() {

  localStorage.setItem("invitacionAbierta", "true");

  const sobre = document.getElementById('sobre');
  const hero = document.getElementById('hero');
  const contenido = document.getElementById('contenido');
  const ubicacion = document.getElementById('ubicacion');
  const galeria = document.getElementById('galeria');
  const footer = document.getElementById('footer');
  const intro = document.getElementById('intro');

  document.body.classList.add('opened');
  document.body.style.overflowY = "auto";

  sobre.classList.add('open');

  setTimeout(() => {
    sobre.classList.add('fade-out');
  }, 1000);

  setTimeout(() => {
    intro.style.display = 'none';

    hero.classList.add('visible');
    contenido.classList.add('visible');
    ubicacion.classList.add('visible');
    galeria.classList.add('visible');
    footer.classList.add('visible');
  }, 1700);
}

/* Si ya estaba abierta al recargar */
window.onload = function() {
  if (localStorage.getItem("invitacionAbierta") === "true") {
    abrirInvitacion();
  }
};

/* Cuenta regresiva */
const fechaBoda = new Date("June 27, 2026 16:30:00").getTime();
const contador = document.createElement('div');
contador.style.fontSize = '22px';
contador.style.marginTop = '20px';
document.querySelector('.date').after(contador);

setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);

  contador.innerHTML = `Faltan ${dias} días y ${horas} horas`;
}, 1000);
</script>

</body>
</html>
