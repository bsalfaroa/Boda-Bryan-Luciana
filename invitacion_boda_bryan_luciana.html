<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f5f5f2;
  color: #444;
  text-align: center;
}

.hero {
  background-image: url('foto-portada.jpg');
  background-size: cover;
  background-position: center;
  padding: 120px 20px;
  color: white;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  margin: 0;
}

.section {
  padding: 60px 20px;
}

.envelope {
  width: 200px;
  margin: 30px auto;
  cursor: pointer;
  transition: transform 0.4s ease;
}

.envelope:hover {
  transform: scale(1.05);
}

.date {
  font-size: 28px;
  margin-top: 20px;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background-color: #6c8f76;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

.gallery img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 15px;
}

footer {
  padding: 30px;
  font-size: 14px;
  background: #eaeaea;
}
</style>
</head>
<body>

<div class="hero">
  <h1>Bryan & Luciana</h1>
</div>

<div class="section">
  <p>Para abrir la invitación haz clic en el sobre:</p>
  <img src="sobre.png" class="envelope" onclick="mostrarInvitacion()">
</div>

<div id="contenido" style="display:none;" class="section">
  <h2>Nos casamos el día:</h2>
  <div class="date">Sábado, 27 de junio 2026</div>
  <a class="button" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Bryan+y+Luciana&dates=20260627/20260628" target="_blank">Agregar a mi calendario</a>
</div>

<div class="section gallery">
  <h2>Nuestras Fotos</h2>
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<div class="section">
  <h2>Ubicación del Evento</h2>
  <a class="button" href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">Ver en Google Maps</a>
</div>

<div class="section">
  <h2>Confirmar Asistencia</h2>
  <a class="button" href="#" onclick="alert('Aquí luego conectaremos tu formulario RSVP');">Confirmar</a>
</div>

<footer>
  Con amor, 2026
</footer>

<script>
// Cuenta regresiva
const fechaBoda = new Date("June 27, 2026 00:00:00").getTime();
const contador = document.createElement('div');
contador.style.fontSize = '22px';
contador.style.marginTop = '20px';
document.querySelector('.date').after(contador);

setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);

  contador.innerHTML = `Faltan ${dias} días y ${horas} horas`;
}, 1000);
</script>

<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function mostrarInvitacion() {
  document.getElementById('contenido').style.display = 'block';
  window.scrollTo({ top: document.getElementById('contenido').offsetTop, behavior: 'smooth' });
}
</script>

</body>
</html>
